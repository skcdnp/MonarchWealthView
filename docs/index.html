<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MonarchWealthView</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <!-- ── SIGN-IN SCREEN ──────────────────────────────────────────────────── -->
  <div id="signin-screen" class="hidden" style="min-height:100dvh;display:none;align-items:center;justify-content:center;background:var(--bg-tertiary)">
    <div style="background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:16px;padding:40px;max-width:340px;width:100%;text-align:center;margin:16px">
      <div style="font-size:36px;margin-bottom:14px">👑</div>
      <p style="font-size:15px;font-weight:500;color:var(--text-primary);margin-bottom:4px">MonarchWealthView</p>
      <p style="font-size:12px;color:var(--text-tertiary);margin-bottom:28px">Family Portfolio Manager</p>
      <div id="google-signin-btn" style="display:flex;justify-content:center"></div>
      <p style="font-size:11px;color:var(--text-tertiary);margin-top:16px">Sign in with your authorised Google account</p>
    </div>
  </div>

  <!-- ── ACCESS DENIED SCREEN ────────────────────────────────────────────── -->
  <div id="access-denied-screen" style="display:none;min-height:100dvh;align-items:center;justify-content:center;background:var(--bg-tertiary)">
    <div style="background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:16px;padding:40px;max-width:340px;width:100%;text-align:center;margin:16px">
      <div style="font-size:36px;margin-bottom:14px">🔒</div>
      <p style="font-size:15px;font-weight:500;color:var(--color-liability);margin-bottom:6px">Access Not Granted</p>
      <p style="font-size:12px;color:var(--text-tertiary);margin-bottom:4px">Signed in as</p>
      <p id="access-denied-email" style="font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:10px"></p>
      <p style="font-size:12px;color:var(--text-tertiary);margin-bottom:20px">This app is private. Contact the owner to request access.</p>
      <button id="access-denied-signout" class="btn btn-outline" style="width:100%;justify-content:center">Sign out</button>
    </div>
  </div>

  <!-- ── LOADING SCREEN ──────────────────────────────────────────────────── -->
  <div id="loading-screen" style="min-height:100dvh;display:flex;align-items:center;justify-content:center;background:var(--bg-tertiary)">
    <div style="text-align:center">
      <div style="width:36px;height:36px;border-radius:50%;border:2.5px solid var(--border-light);border-top-color:var(--color-primary);animation:spin 0.7s linear infinite;margin:0 auto 14px"></div>
      <p id="loading-message" style="font-size:13px;color:var(--text-tertiary)">Loading…</p>
    </div>
  </div>

  <!-- ── APP SHELL ────────────────────────────────────────────────────────── -->
  <div id="app-shell" style="display:none">

    <!-- Mobile sidebar overlay -->
    <div id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside id="sidebar"></aside>

    <!-- Main area -->
    <div id="main-area">

      <!-- Top bar -->
      <div id="topbar">
        <div style="display:flex;align-items:center;gap:10px;min-width:0">
          <button id="hamburger-btn" aria-label="Menu">☰</button>
          <div style="min-width:0">
            <p id="page-title" style="font-size:15px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></p>
            <p id="topbar-date" style="font-size:12px;color:var(--text-tertiary)"></p>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <button id="add-account-topbar-btn" class="btn btn-outline">+ Add Account</button>
          <button id="edit-profile-btn" class="btn btn-primary">Edit Profile</button>
        </div>
      </div>

      <!-- Page content -->
      <main id="main-content"></main>
    </div>
  </div>

  <!-- ── TOAST CONTAINER ─────────────────────────────────────────────────── -->
  <div id="toast-container" style="position:fixed;bottom:16px;right:16px;z-index:60;display:flex;flex-direction:column;gap:8px;pointer-events:none"></div>

  <!-- ── MODAL CONTAINER ─────────────────────────────────────────────────── -->
  <div id="modal-container"></div>

  <!-- Google APIs -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <!-- Chart.js (used only for history line chart) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- App config -->
  <script src="config.js"></script>
  <!-- Entry point -->
  <script type="module" src="js/main.js"></script>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
  </style>
</body>
</html>
